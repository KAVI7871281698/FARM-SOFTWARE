{% extends 'base.html' %}

{% block title %}Groups{% endblock %}
{% block header_title %}Groups{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3>Groups</h3>
        <button onclick="window.location.href='{% url 'add_group' %}'"
            style="background: var(--primary-color); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Outfit';"><i
                class="fa-solid fa-plus"></i> Add Group</button>
    </div>
    <div style="overflow-x: auto; width: 100%;">
        <table style="width: 100%; min-width: 500px; border-collapse: collapse; text-align: left;">
            <thead style="background: var(--primary-light); color: var(--primary-color);">
                <tr>
                    <th style="padding: 1rem;">Group Code</th>
                    <th style="padding: 1rem;">Group Name</th>
                    <th style="padding: 1rem;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for group in groups %}
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 1rem; font-weight: 500;">{{ group.code }}</td>
                    <td style="padding: 1rem;">{{ group.name }}</td>
                    <td style="padding: 1rem;">
                        <a href="{% url 'edit_group' group.id %}" style="color: var(--primary-color); text-decoration: none; font-weight: 600;"><i class="fa-solid fa-pen-to-square"></i> Edit</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="padding: 1rem; text-align: center; color: var(--text-muted);">No groups
                        available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
