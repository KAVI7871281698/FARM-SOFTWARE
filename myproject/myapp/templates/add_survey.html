{% extends 'base.html' %}

{% block title %}Add Survey{% endblock %}
{% block header_title %}Add Survey{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    .flatpickr-calendar {
        font-family: 'Outfit', sans-serif;
    }
</style>
{% endblock %}

{% block content %}
<div
    style="background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto;">
    <h2 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Survey Details
    </h2>
    <form method="POST" action="{% url 'add_survey' %}" enctype="multipart/form-data">
        {% csrf_token %}
        <div
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey
                    Title</label>
                <input type="text" name="title" placeholder="e.g. Q3 Crop Health Assessment"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';"
                    required>
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Select
                    Plot / Farmer</label>
                <select name="plot_id"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;"
                    required>
                    <option value="" disabled selected>Select Plot</option>
                    {% for plot in plots %}
                    <option value="{{ plot.id }}">{{ plot.plot_code }} ({{ plot.farmer.name }})</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Assign
                    Officer</label>
                <select name="officer_id"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;"
                    required>
                    <option value="" disabled selected>Select Officer</option>
                    {% for officer in officers %}
                    <option value="{{ officer.id }}">{{ officer.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey
                    Stage</label>
                <select name="survey_stage"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;">
                    <option value="Pre-Planting">Pre-Planting</option>
                    <option value="Growing">Growing</option>
                    <option value="Harvest">Harvest</option>
                    <option value="Post-Harvest">Post-Harvest</option>
                </select>
            </div>

            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey
                    Month</label>
                <input type="month" name="survey_month" id="survey_month"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';"
                    required>
            </div>

            <div style="grid-column: 1 / -1;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey
                    Description</label>
                <textarea name="description" rows="3"
                    placeholder="Objectives and specific instructions for this survey..."
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; resize: vertical;"></textarea>
            </div>

            <div style="grid-column: 1 / -1;">
                <label
                    style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Allocated
                    Dates</label>
                <input type="text" name="allocated_dates" id="allocated_dates" placeholder="Select multiple dates..."
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;"
                    required>
            </div>

            <!-- New Fields -->
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Weed Infestation</label>
                <input type="text" name="weed_infestation" placeholder="e.g. Low, High"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Tillering Vigour</label>
                <input type="text" name="tillering_vigour" placeholder="e.g. Good"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Pest Incidence</label>
                <input type="text" name="pest_incidence" placeholder="e.g. None"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Disease Incidence</label>
                <input type="text" name="disease_incidence" placeholder="e.g. None"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Irrigation Status</label>
                <input type="text" name="irrigation_status" placeholder="e.g. Sufficient"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Nutrition Status</label>
                <input type="text" name="nutrition_status" placeholder="e.g. Optimal"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
            </div>

            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Field Photo 1</label>
                <input type="file" name="field_photo1" accept="image/*"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Field Photo 2</label>
                <input type="file" name="field_photo2" accept="image/*"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Field Photo 3</label>
                <input type="file" name="field_photo3" accept="image/*"
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;">
            </div>

            <div style="grid-column: 1 / -1;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Remarks</label>
                <textarea name="remarks" rows="2" placeholder="Any additional remarks..."
                    style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; resize: vertical;"></textarea>
            </div>
        </div>

        <div style="text-align: right;">
            <button type="button" onclick="window.location.href='{% url 'surveys' %}'"
                style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 1rem; font-family: 'Outfit';">Cancel</button>
            <button type="submit"
                style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit';">Create
                Survey</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Chart default settings
    Chart.defaults.font.family = "'Outfit', sans-serif";
    Chart.defaults.color = "#666";
    // ... skipping chart setup ...
</script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.querySelector('.sidebar');
        if (menuToggle && sidebar) {
            menuToggle.addEventListener('click', function () {
                sidebar.classList.toggle('open');
            });
        }

        flatpickr("#allocated_dates", {
            mode: "multiple",
            dateFormat: "Y-m-d",
            placeholder: "Select multiple dates...",
        });
    });
</script>
{% endblock %}
