{% extends 'base.html' %}

{% block title %}Add Survey{% endblock %}
{% block header_title %}Add Survey{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Survey Details</h2>
        <form method="POST" action="{% url 'add_survey' %}">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey Title</label>
                    <input type="text" name="title" placeholder="e.g. Q3 Crop Health Assessment" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Select Plot / Farmer</label>
                    <select name="plot_id" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;" required>
                        <option value="" disabled selected>Select Plot</option>
                        {% for plot in plots %}
                        <option value="{{ plot.id }}">{{ plot.plot_code }} ({{ plot.farmer.name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Assign Officer</label>
                    <select name="officer_id" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;" required>
                        <option value="" disabled selected>Select Officer</option>
                        {% for officer in officers %}
                        <option value="{{ officer.id }}">{{ officer.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey Stage</label>
                    <select name="survey_stage" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;">
                        <option value="Pre-Planting">Pre-Planting</option>
                        <option value="Growing">Growing</option>
                        <option value="Harvest">Harvest</option>
                        <option value="Post-Harvest">Post-Harvest</option>
                    </select>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey Month</label>
                    <input type="month" name="survey_month" id="survey_month" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Number of Survey Days</label>
                    <input type="number" name="number_of_days" id="number_of_days" min="1" max="31" placeholder="e.g. 3" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                
                <div style="grid-column: 1 / -1;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Survey Description</label>
                    <textarea name="description" rows="3" placeholder="Objectives and specific instructions for this survey..." style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; resize: vertical;"></textarea>
                </div>
                
                <div id="allocated_dates_container" style="grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                    <!-- Date inputs will be dynamically generated here -->
                </div>
            </div>
            
            <div style="text-align: right;">
                <button type="button" onclick="window.location.href='{% url 'surveys' %}'" style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 1rem; font-family: 'Outfit';">Cancel</button>
                <button type="submit" style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit';">Create Survey</button>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
<script>
        // Chart default settings
        Chart.defaults.font.family = "'Outfit', sans-serif";
        Chart.defaults.color = "#666";

        // NDVI Trend Chart (Line)
        const ctxNdvi = document.getElementById('ndviTrendChart').getContext('2d');
        new Chart(ctxNdvi, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Average NDVI',
                    data: [0.45, 0.52, 0.61, 0.68, 0.75, 0.72],
                    borderColor: '#2e7d32',
                    backgroundColor: 'rgba(46, 125, 50, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 1 }
                }
            }
        });

        // Crop Health Chart (Doughnut)
        const ctxHealth = document.getElementById('cropHealthChart').getContext('2d');
        new Chart(ctxHealth, {
            type: 'doughnut',
            data: {
                labels: ['Healthy', 'Moderate', 'Poor'],
                datasets: [{
                    data: [65, 25, 10],
                    backgroundColor: ['#2e7d32', '#f57c00', '#d32f2f'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Scout Status Chart (Bar)
        const ctxScout = document.getElementById('scoutStatusChart').getContext('2d');
        new Chart(ctxScout, {
            type: 'bar',
            data: {
                labels: ['Completed', 'Pending', 'Overdue'],
                datasets: [{
                    label: 'Scouts',
                    data: [42, 15, 8],
                    backgroundColor: ['#2e7d32', '#0288d1', '#f57c00'],
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Survey Completion (Radial/PolarArea or specific plugin, using Doughnut for progress)
        const ctxSurvey = document.getElementById('surveyCompletionChart').getContext('2d');
        new Chart(ctxSurvey, {
            type: 'doughnut',
            data: {
                labels: ['Completed', 'Remaining'],
                datasets: [{
                    data: [78, 22],
                    backgroundColor: ['#0288d1', '#e0e0e0'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '80%',
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: { enabled: false }
                }
            },
            plugins: [{
                id: 'textCenter',
                beforeDraw: function (chart) {
                    var width = chart.width,
                        height = chart.height,
                        ctx = chart.ctx;
                    ctx.restore();
                    var fontSize = (height / 114).toFixed(2);
                    ctx.font = "bold " + fontSize + "em Outfit";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#333";
                    var text = "78%",
                        textX = Math.round((width - ctx.measureText(text).width) / 2),
                        textY = height / 1.5;
                    ctx.fillText(text, textX, textY);
                    ctx.save();
                }
            }]
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function () {
                    sidebar.classList.toggle('open');
                });
            }
        });
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const daysInput = document.getElementById('number_of_days');
            const monthInput = document.getElementById('survey_month');
            const container = document.getElementById('allocated_dates_container');

            function generateDateInputs() {
                container.innerHTML = '';
                const days = parseInt(daysInput.value);
                const monthVal = monthInput.value;
                
                if (days > 0 && monthVal) {
                    const [year, month] = monthVal.split('-');
                    const lastDay = new Date(year, month, 0).getDate();
                    
                    for (let i = 1; i <= days; i++) {
                        const div = document.createElement('div');
                        div.innerHTML = `
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Allocated Date ${i}</label>
                            <input type="date" name="allocated_date_${i}" required
                                   min="${monthVal}-01" 
                                   max="${monthVal}-${lastDay}"
                                   style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
                        `;
                        container.appendChild(div);
                    }
                }
            }

            if(daysInput && monthInput) {
                daysInput.addEventListener('input', generateDateInputs);
                monthInput.addEventListener('change', generateDateInputs);
            }
        });
{% endblock %}
