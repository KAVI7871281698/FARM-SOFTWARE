{% extends 'base.html' %}

{% block title %}Settings{% endblock %}
{% block header_title %}Settings{% endblock %}

{% block content %}
<div style="display: flex; gap: 2rem; flex-wrap: wrap;">
        <!-- Navigation Tabs -->
        <div style="width: 250px; flex-shrink: 0;">
            <ul style="list-style: none;">
                <li style="margin-bottom: 0.5rem;"><a href="#" style="display: block; padding: 1rem; background: var(--primary-color); color: white; border-radius: 8px; text-decoration: none; font-weight: 500;"><i class="fa-solid fa-user" style="margin-right: 10px;"></i> Profile Info</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="#" style="display: block; padding: 1rem; background: transparent; color: var(--text-muted); border-radius: 8px; text-decoration: none; font-weight: 500; transition: 0.3s;" onmouseover="this.style.background='var(--primary-light)'" onmouseout="this.style.background='transparent'"><i class="fa-solid fa-bell" style="margin-right: 10px;"></i> Notifications</a></li>
                <li style="margin-bottom: 0.5rem;"><a href="#" style="display: block; padding: 1rem; background: transparent; color: var(--text-muted); border-radius: 8px; text-decoration: none; font-weight: 500; transition: 0.3s;" onmouseover="this.style.background='var(--primary-light)'" onmouseout="this.style.background='transparent'"><i class="fa-solid fa-lock" style="margin-right: 10px;"></i> Security</a></li>
            </ul>
        </div>

        <!-- Form Area -->
        <div style="flex: 1; min-width: 300px; background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
            <h3 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Profile Information</h3>
            
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 2rem;">
                <img src="https://ui-avatars.com/api/?name=Farmer&background=2e7d32&color=fff" alt="User" style="width: 80px; height: 80px; border-radius: 50%;">
                <div>
                    <button style="background: var(--primary-light); color: var(--primary-color); border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 600; margin-right: 10px; font-family: 'Outfit';">Change Photo</button>
                    <button style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: 500; font-family: 'Outfit';">Remove</button>
                </div>
            </div>

            <form style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Full Name</label>
                    <input type="text" value="John Farmer" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; font-family: 'Outfit';">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Mobile Number</label>
                    <input type="tel" value="9876543210" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; font-family: 'Outfit';">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Village Panchayat (VP)</label>
                    <input type="text" value="Green Valley" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; font-family: 'Outfit';">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Language</label>
                    <select style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-size: 1rem; font-family: 'Outfit';">
                        <option>English</option>
                        <option>Tamil</option>
                        <option>Hindi</option>
                    </select>
                </div>
                <div style="grid-column: 1 / -1; margin-top: 1rem;">
                    <button type="button" style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; font-family: 'Outfit'; transition: 0.3s;" onmouseover="this.style.background='var(--primary-hover)'" onmouseout="this.style.background='var(--primary-color)'">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            if(menuToggle && sidebar) {
                menuToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('open');
                });
            }
        });
    </script>
{% endblock %}
