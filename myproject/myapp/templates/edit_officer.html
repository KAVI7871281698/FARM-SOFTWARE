{% extends 'base.html' %}

{% block title %}Edit Officer{% endblock %}
{% block header_title %}Edit Officer{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Officer Details & Permissions</h2>
        
        <form method="POST" action="{% url 'edit_officer' officer.id %}">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Full Name</label>
                    <input type="text" name="name" value="{{ officer.name }}" placeholder="Enter full name" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Mobile Number</label>
                    <input type="tel" name="mobile" value="{{ officer.mobile }}" placeholder="Enter mobile number" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Email Address</label>
                    <input type="email" name="email" value="{{ officer.email }}" placeholder="Enter email" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Assign Role</label>
                    <select name="role" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background: white;" required>
                        <option value="" disabled selected>Select Role</option>
                        {% for role in roles %}
                        <option value="{{ role.id }}" {% if officer.role and officer.role.id == role.id %}selected{% endif %}>{{ role.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Initial Password</label>
                    <input type="password" name="password" placeholder="Enter new password to change" style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';" required>
                </div>
            </div>

            <h3 style="margin-bottom: 1rem; color: #333;">Module Access / Permissions</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; background: var(--bg-color); padding: 1.5rem; border-radius: 8px;">
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="dashboard" {% if 'dashboard' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Dashboard</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="field_intelligence" {% if 'field_intelligence' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Field Intelligence</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="analytics" {% if 'analytics' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Analytics</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="ndvi_monitoring" {% if 'ndvi_monitoring' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">NDVI Monitoring</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="scouting" {% if 'scouting' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Scouting</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="reports" {% if 'reports' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Reports</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="officers" {% if 'officers' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Officers</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="settings" {% if 'settings' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Settings</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="users" {% if 'users' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Farmers</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="villages" {% if 'villages' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Villages</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="sections" {% if 'sections' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Sections</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="varieties" {% if 'varieties' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Varieties</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="plots" {% if 'plots' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Plots</span>
                </label>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" name="permissions[]" value="surveys" {% if 'surveys' in officer.permissions %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary-color);">
                    <span style="font-weight: 500; color: #444;">Surveys</span>
                </label>
            </div>

            <div style="text-align: right;">
                <button type="button" onclick="window.location.href='{% url 'officers' %}'" style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 1rem; font-family: 'Outfit';">Cancel</button>
                <button type="submit" style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit';">Update Officer</button>
            </div>
        </form>
    </div>
{% endblock %}

{% block scripts %}
<script>
        // Chart default settings
        Chart.defaults.font.family = "'Outfit', sans-serif";
        Chart.defaults.color = "#666";

        // NDVI Trend Chart (Line)
        const ctxNdvi = document.getElementById('ndviTrendChart').getContext('2d');
        new Chart(ctxNdvi, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Average NDVI',
                    data: [0.45, 0.52, 0.61, 0.68, 0.75, 0.72],
                    borderColor: '#2e7d32',
                    backgroundColor: 'rgba(46, 125, 50, 0.1)',
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, max: 1 }
                }
            }
        });

        // Crop Health Chart (Doughnut)
        const ctxHealth = document.getElementById('cropHealthChart').getContext('2d');
        new Chart(ctxHealth, {
            type: 'doughnut',
            data: {
                labels: ['Healthy', 'Moderate', 'Poor'],
                datasets: [{
                    data: [65, 25, 10],
                    backgroundColor: ['#2e7d32', '#f57c00', '#d32f2f'],
                    borderWidth: 0,
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '70%',
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });

        // Scout Status Chart (Bar)
        const ctxScout = document.getElementById('scoutStatusChart').getContext('2d');
        new Chart(ctxScout, {
            type: 'bar',
            data: {
                labels: ['Completed', 'Pending', 'Overdue'],
                datasets: [{
                    label: 'Scouts',
                    data: [42, 15, 8],
                    backgroundColor: ['#2e7d32', '#0288d1', '#f57c00'],
                    borderRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Survey Completion (Radial/PolarArea or specific plugin, using Doughnut for progress)
        const ctxSurvey = document.getElementById('surveyCompletionChart').getContext('2d');
        new Chart(ctxSurvey, {
            type: 'doughnut',
            data: {
                labels: ['Completed', 'Remaining'],
                datasets: [{
                    data: [78, 22],
                    backgroundColor: ['#0288d1', '#e0e0e0'],
                    borderWidth: 0,
                    circumference: 180,
                    rotation: 270
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '80%',
                plugins: {
                    legend: { position: 'bottom' },
                    tooltip: { enabled: false }
                }
            },
            plugins: [{
                id: 'textCenter',
                beforeDraw: function (chart) {
                    var width = chart.width,
                        height = chart.height,
                        ctx = chart.ctx;
                    ctx.restore();
                    var fontSize = (height / 114).toFixed(2);
                    ctx.font = "bold " + fontSize + "em Outfit";
                    ctx.textBaseline = "middle";
                    ctx.fillStyle = "#333";
                    var text = "78%",
                        textX = Math.round((width - ctx.measureText(text).width) / 2),
                        textY = height / 1.5;
                    ctx.fillText(text, textX, textY);
                    ctx.save();
                }
            }]
        });
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.querySelector('.sidebar');
            if (menuToggle && sidebar) {
                menuToggle.addEventListener('click', function () {
                    sidebar.classList.toggle('open');
                });
            }
        });
    </script>
{% endblock %}
