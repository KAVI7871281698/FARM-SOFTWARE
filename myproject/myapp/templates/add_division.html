{% extends 'base.html' %}

{% block title %}Add Division{% endblock %}
{% block header_title %}Add Division{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Division Details</h2>
        <form method="POST" action="{% url 'add_division' %}">
            {% csrf_token %}
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Division Code</label>
                    <input type="text" name="code" placeholder="Auto-generated (e.g. DIV-001)" disabled style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background-color: #f9f9f9;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Factory Name</label>
                    <select name="factory_id" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit'; background-color: white;">
                        <option value="">Select Factory</option>
                        {% for factory in factories %}
                            <option value="{{ factory.id }}">{{ factory.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted);">Division Name</label>
                    <input type="text" name="name" placeholder="Enter division name" required style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px; outline: none; font-family: 'Outfit';">
                </div>
            </div>
            <div style="text-align: right;">
                <button type="button" onclick="window.location.href='{% url 'divisions' %}'" style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 1rem; font-family: 'Outfit';">Cancel</button>
                <button type="submit" style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit';">Save Division</button>
            </div>
        </form>
</div>
{% endblock %}
