{% extends 'base.html' %}

{% block title %}Field Intelligence{% endblock %}
{% block header_title %}Field Intelligence{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
<style>
    #map {
        height: 500px;
        width: 100%;
        border-radius: 12px;
        margin-top: 1rem;
    }
    .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1.5rem;
        margin-bottom: 2rem;
    }
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
    }
    .form-control {
        width: 100%;
        padding: 0.8rem;
        border: 1px solid #ddd;
        border-radius: 8px;
        outline: none;
        font-family: 'Outfit';
        background: white;
    }
    .form-control[readonly] {
        background: #f9f9f9;
        color: #888;
    }
</style>
{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 2rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <h2 style="margin-bottom: 1.5rem; color: #333; border-bottom: 1px solid #eee; padding-bottom: 1rem;">Map Field Boundary</h2>
    
    <form method="POST" action="{% url 'field_intelligence' %}" enctype="multipart/form-data" id="fieldForm">
        {% csrf_token %}
        <input type="hidden" name="boundary" id="boundaryData">
        
        <div class="form-grid">
            <div class="form-group">
                <label>Farmer Name</label>
                <select name="farmer_id" id="farmerSelect" class="form-control" required onchange="onFarmerSelect()">
                    <option value="" disabled selected>Select Farmer</option>
                    {% for farmer in farmers %}
                    <option value="{{ farmer.id }}" 
                        data-code="{{ farmer.farmer_code|default:'' }}"
                        data-div="{{ farmer.division|default:'' }}"
                        data-sec="{{ farmer.section.section_name|default:'' }}"
                        data-vil="{{ farmer.village.village_name|default:'' }}">
                        {{ farmer.name }} - {{ farmer.farmer_code }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label>Farmer Code</label>
                <input type="text" id="farmerCode" class="form-control" readonly>
            </div>
            
            <div class="form-group">
                <label>Division</label>
                <input type="text" id="divisionName" class="form-control" readonly>
            </div>
            
            <div class="form-group">
                <label>Section</label>
                <input type="text" id="sectionName" class="form-control" readonly>
            </div>
            
            <div class="form-group">
                <label>Village</label>
                <input type="text" id="villageName" class="form-control" readonly>
            </div>
            
            <div class="form-group">
                <label>Select Plot</label>
                <select name="plot_id" id="plotSelect" class="form-control" required>
                    <option value="" disabled selected>Select Plot</option>
                    <!-- Populated via AJAX -->
                </select>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Image 1</label>
                <input type="file" name="img1" class="form-control" accept="image/*">
            </div>
            <div class="form-group">
                <label>Image 2</label>
                <input type="file" name="img2" class="form-control" accept="image/*">
            </div>
            <div class="form-group">
                <label>Image 3</label>
                <input type="file" name="img3" class="form-control" accept="image/*">
            </div>
        </div>

        <div style="margin-bottom: 2rem;">
            <label style="font-weight: 500; color: var(--text-muted);">Draw Field Boundary (Use Polygon Tool on the left)</label>
            <div id="map"></div>
        </div>

        <div style="text-align: right;">
            <button type="button" onclick="window.location.reload()"
                style="background: transparent; color: var(--text-muted); border: 1px solid #ddd; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; margin-right: 1rem; font-family: 'Outfit';">Clear</button>
            <button type="submit"
                style="background: var(--primary-color); color: white; border: none; padding: 0.8rem 2rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-family: 'Outfit';">Save Field Intelligence</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
<script>
    function onFarmerSelect() {
        var select = document.getElementById('farmerSelect');
        var opt = select.options[select.selectedIndex];
        
        if (opt.value) {
            document.getElementById('farmerCode').value = opt.getAttribute('data-code');
            document.getElementById('divisionName').value = opt.getAttribute('data-div');
            document.getElementById('sectionName').value = opt.getAttribute('data-sec');
            document.getElementById('villageName').value = opt.getAttribute('data-vil');
            
            // Fetch plots via AJAX
            fetch(`/api/get_farmer_plots/?farmer_id=${opt.value}`)
                .then(res => res.json())
                .then(data => {
                    var plotSelect = document.getElementById('plotSelect');
                    plotSelect.innerHTML = '<option value="" disabled selected>Select Plot</option>';
                    if(data.status === 'success') {
                        data.plots.forEach(p => {
                            plotSelect.innerHTML += `<option value="${p.id}">${p.plot_code} (${p.area_acre} Acres)</option>`;
                        });
                    }
                })
                .catch(err => console.error("Error fetching plots", err));
        }
    }

    // Initialize Map
    var map = L.map('map').setView([11.0168, 76.9558], 10); // Default center (Coimbatore approx)

    // Add Google Satellite Layer
    L.tileLayer('http://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{
        maxZoom: 20,
        subdomains:['mt0','mt1','mt2','mt3']
    }).addTo(map);

    // Initialize Leaflet Draw
    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);
    var drawControl = new L.Control.Draw({
        draw: {
            polyline: false,
            polygon: {
                allowIntersection: false,
                drawError: {
                    color: '#e1e100', 
                    message: '<strong>Error:</strong> polygon edges cannot cross!' 
                },
                shapeOptions: {
                    color: '#bada55'
                }
            },
            circle: false,
            rectangle: false,
            marker: false,
            circlemarker: false
        },
        edit: {
            featureGroup: drawnItems,
            remove: true
        }
    });
    map.addControl(drawControl);

    map.on(L.Draw.Event.CREATED, function (e) {
        var layer = e.layer;
        
        // Clear previous drawings so we only have one boundary
        drawnItems.clearLayers();
        drawnItems.addLayer(layer);
        
        // Convert to GeoJSON and store in hidden input
        var geojson = layer.toGeoJSON();
        document.getElementById('boundaryData').value = JSON.stringify(geojson.geometry.coordinates);
    });

    map.on(L.Draw.Event.EDITED, function (e) {
        var layers = e.layers;
        layers.eachLayer(function (layer) {
            var geojson = layer.toGeoJSON();
            document.getElementById('boundaryData').value = JSON.stringify(geojson.geometry.coordinates);
        });
    });

    map.on(L.Draw.Event.DELETED, function (e) {
        document.getElementById('boundaryData').value = "";
    });

    document.getElementById('fieldForm').addEventListener('submit', function(e) {
        if (!document.getElementById('boundaryData').value) {
            e.preventDefault();
            alert("Please draw a boundary on the map before saving.");
        }
    });
</script>
{% endblock %}
