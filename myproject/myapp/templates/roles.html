{% extends 'base.html' %}

{% block title %}Roles{% endblock %}
{% block header_title %}Roles{% endblock %}

{% block content %}
<div style="background: var(--card-bg); padding: 1.5rem; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h3>Roles</h3>
        <button type="button" class="delete-selected-btn" style="background: #f57c00; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Outfit';"><i class="fa-solid fa-trash-can"></i> Delete Selected</button>
            <button type="button" class="delete-all-btn" style="background: #d32f2f; color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Outfit';"><i class="fa-solid fa-dumpster-fire"></i> Delete All</button>
            <button onclick="window.location.href='{% url 'add_role' %}'"
            style="background: var(--primary-color); color: white; border: none; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Outfit';"><i
                class="fa-solid fa-plus"></i> Add Role</button>
    </div>
    <div style="overflow-x: auto; width: 100%;">
        <table style="width: 100%; min-width: 500px; border-collapse: collapse; text-align: left;" data-model="Role">
            <thead style="background: var(--primary-light); color: var(--primary-color);">
                <tr>
                    <th style="padding: 1rem; width: 40px;"><input type="checkbox" class="select-all-checkbox"></th>
                    <th style="padding: 1rem;">Role Name</th>
                    <th style="padding: 1rem;">Action</th>
                </tr>
            </thead>
            <tbody>
                {% for role in roles %}
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 1rem;"><input type="checkbox" class="row-checkbox" value="{{ role.id }}"></td>
                    <td style="padding: 1rem; font-weight: 500;">{{ role.name }}</td>
                    <td style="padding: 1rem;">
                        <a href="{% url 'edit_role' role.id %}" style="color: var(--primary-color); text-decoration: none; font-weight: 600; margin-right: 15px;"><i class="fa-solid fa-pen-to-square"></i> Edit</a>
                        <a href="{% url 'delete_role' role.id %}" style="color: #d32f2f; text-decoration: none; font-weight: 600;" onclick="return confirm('Are you sure you want to delete this role?');"><i class="fa-solid fa-trash"></i> Delete</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" style="padding: 1rem; text-align: center; color: var(--text-muted);">No roles
                        available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
