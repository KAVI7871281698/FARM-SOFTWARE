<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Signals - Signup</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2e7d32;
            --primary-hover: #1b5e20;
            --bg-glass: rgba(255, 255, 255, 0.15);
            --border-glass: rgba(255, 255, 255, 0.3);
            --text-light: #f5f5f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('{% static "images/real_bg.png" %}') fixed center center/cover;
            color: #333;
            padding: 2rem 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 650px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--primary-color);
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .auth-container {
                padding: 2rem;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #444;
            font-size: 0.85rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
            transform: scale(1.02);
        }

        .btn-submit {
            width: 100%;
            padding: 0.875rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(46, 125, 50, 0.3);
            margin-top: 1.5rem;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(46, 125, 50, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #666;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .auth-footer a:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem;
                border-radius: 16px;
            }

            .auth-header h1 {
                font-size: 1.75rem;
            }

            .auth-header p {
                font-size: 0.85rem;
            }

            .form-group label {
                font-size: 0.85rem;
            }

            .form-group input {
                padding: 0.65rem 0.85rem;
                font-size: 0.95rem;
            }

            .btn-submit {
                padding: 0.75rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Farm Signals</h1>
            <p>Register as a farmer to get started</p>
        </div>
        <form id="signupForm" method="POST">
            {% csrf_token %}
            <div class="form-grid">
                <div class="form-group">
                    <label for="vp">VP (Village Panchayat)</label>
                    <input type="text" id="vp" name="vp" placeholder="Enter VP" required>
                </div>
                <div class="form-group">
                    <label for="farmerName">Farmer Name</label>
                    <input type="text" id="farmerName" name="farmerName" placeholder="Enter Full Name" required>
                </div>
                <div class="form-group">
                    <label for="mobile">Mobile Number</label>
                    <input type="tel" id="mobile" name="mobile" placeholder="Enter Mobile No." required
                        pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label for="village">Village</label>
                    <input type="text" id="village" name="village" placeholder="Enter Village" required>
                </div>
                <div class="form-group">
                    <label for="plotNumber">Plot Number</label>
                    <input type="text" id="plotNumber" name="plotNumber" placeholder="Enter Plot Number" required>
                </div>
                <div class="form-group">
                    <label for="area">Area (in acres)</label>
                    <input type="number" step="0.01" id="area" name="area" placeholder="Enter Area" required>
                </div>
                <div class="form-group">
                    <label for="variety">Variety</label>
                    <input type="text" id="variety" name="variety" placeholder="Enter Crop Variety" required>
                </div>
                <div class="form-group">
                    <label for="plantingDate">Planting Date</label>
                    <input type="date" id="plantingDate" name="plantingDate" required>
                </div>
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="password">Create Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a password" required>
                </div>
            </div>
            <button type="submit" class="btn-submit">Register</button>
        </form>
        <div class="auth-footer">
            Already have an account? <a href="{% url 'index' %}">Sign In</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = 'Registering...';
            btn.style.opacity = '0.8';
        });
    </script>
</body>

</html>
